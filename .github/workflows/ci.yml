name: Market Intelligence CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest dbt-duckdb duckdb
          pip install -r requirements.txt
      
      - name: Lint with Ruff
        run: |
          ruff check ingestion/ spark/ azure/ --ignore E501
      
      - name: Check formatting
        run: |
          ruff format --check ingestion/ spark/ azure/
        continue-on-error: true
      
      - name: Validate dbt compiles
        run: |
          cd dbt
          dbt deps
          dbt compile
        env:
          DBT_PROFILES_DIR: .
      
      - name: Validate Docker build
        run: |
          docker compose config --quiet

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Docker image
        run: |
          docker compose build --no-cache
      
      - name: Verify containers start
        run: |
          docker compose up -d postgres
          sleep 10
          docker compose ps
          docker compose down